server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: account-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accountdb}
    username: ${DB_USER:acct}
    password: ${DB_PASSWORD:acct}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

securepay:
  service-token: ${SERVICE_TOKEN:}
  jwt:
    issuer: securepay-auth
    access-ttl: PT15M
    refresh-ttl: P7D
    public-key: ${JWT_PUBLIC_KEY}
    private-key: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info
