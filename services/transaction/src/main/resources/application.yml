server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/txdb}
    username: ${DB_USER:tx}
    password: ${DB_PASSWORD:tx}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true

securepay:
  account-service-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
  service-token: ${SERVICE_TOKEN:}
  outbox:
    poll-ms: ${OUTBOX_POLL_MS:1000}
    batch-size: ${OUTBOX_BATCH:50}
    send-timeout-ms: ${OUTBOX_SEND_TIMEOUT_MS:5000}
  jwt:
    issuer: securepay-auth
    access-ttl: PT15M
    refresh-ttl: P7D
    public-key: ${JWT_PUBLIC_KEY}
    private-key: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info
