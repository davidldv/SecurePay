worker_processes  auto;
events { worker_connections 1024; }

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    log_format upstream '$remote_addr $request_method $request_uri '
                        '-> $upstream_addr status=$status '
                        'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log upstream;
    error_log  /var/log/nginx/error.log warn;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # 5 req/s per IP for auth (login/register), burst 10.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m  rate=5r/s;
    # 30 req/s per IP for transactions, burst 60.
    limit_req_zone $binary_remote_addr zone=tx_zone:10m    rate=30r/s;
    # 60 req/s per IP for general account reads, burst 120.
    limit_req_zone $binary_remote_addr zone=acct_zone:10m  rate=60r/s;

    limit_req_status 429;

    upstream auth_upstream        { server auth:8080;        keepalive 16; }
    upstream account_upstream     { server account:8080;     keepalive 32; }
    upstream transaction_upstream { server transaction:8080; keepalive 32; }

    server {
        listen 8080 default_server;
        server_name _;

        # Block internal endpoints — only reachable on the docker network from peer services.
        location ~ ^/internal(/|$) { return 404; }

        location /auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://auth_upstream;
        }

        location /accounts {
            limit_req zone=acct_zone burst=120 nodelay;
            proxy_pass http://account_upstream;
        }
        location /accounts/ {
            limit_req zone=acct_zone burst=120 nodelay;
            proxy_pass http://account_upstream;
        }

        location /transactions {
            limit_req zone=tx_zone burst=60 nodelay;
            proxy_pass http://transaction_upstream;
        }
        location /transactions/ {
            limit_req zone=tx_zone burst=60 nodelay;
            proxy_pass http://transaction_upstream;
        }

        location = /healthz {
            access_log off;
            return 200 'ok\n';
        }

        location / { return 404; }
    }
}
